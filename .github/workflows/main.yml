name: Main

# Self-contained CI, styled after the kestra-io plugin-template's main.yml but without the
# kestra-io/actions reusable workflow, so it stays green on this standalone repo (no org secrets).
# When the plugin is adopted upstream, replace this file with the template's main.yml + release.yml,
# which call kestra-io/actions/.github/workflows/plugins.yml and .../composite/plugin-release@main.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-test:
        description: 'Skip tests'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Build, test and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # `build` runs the tests and the kestra-io plugin-doc-lint checks.
      - name: Build, test and lint
        if: ${{ !inputs.skip-test }}
        run: ./gradlew build --no-daemon

      # Skip-test path: compile and lint only, no tests.
      - name: Build and lint (tests skipped)
        if: ${{ inputs.skip-test }}
        run: ./gradlew classes lintPluginDocs --no-daemon

      - name: Build plugin jar
        run: ./gradlew shadowJar --no-daemon

      # The plugin must ship Javalin and its Jetty, but never Kestra's own classes:
      # those come from the runtime, and bundling them breaks plugin loading.
      - name: Verify jar packaging
        run: |
          jar=$(ls build/libs/plugin-rest-server-*.jar)
          echo "Checking $jar"
          if unzip -l "$jar" | grep -q 'io/kestra/core/'; then
            echo "::error::Kestra core classes are bundled in the plugin jar"
            exit 1
          fi
          for pkg in io/javalin/ org/eclipse/jetty/; do
            if ! unzip -l "$jar" | grep -q "$pkg"; then
              echo "::error::$pkg is missing from the plugin jar"
              exit 1
            fi
          done
          unzip -p "$jar" META-INF/MANIFEST.MF | grep -q 'X-Kestra-Name' \
            || { echo "::error::manifest is missing the X-Kestra-* attributes"; exit 1; }

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test
          retention-days: 7

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: plugin-rest-server
          path: build/libs/plugin-rest-server-*.jar
          retention-days: 7
