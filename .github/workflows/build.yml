name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Build plugin jar
        run: ./gradlew shadowJar --no-daemon

      # The plugin must ship Javalin and its Jetty, but never Kestra's own classes:
      # those come from the runtime, and bundling them breaks plugin loading.
      - name: Verify jar packaging
        run: |
          jar=$(ls build/libs/plugin-rest-server-*.jar)
          echo "Checking $jar"
          if unzip -l "$jar" | grep -q 'io/kestra/core/'; then
            echo "::error::Kestra core classes are bundled in the plugin jar"
            exit 1
          fi
          for pkg in io/javalin/ org/eclipse/jetty/; do
            if ! unzip -l "$jar" | grep -q "$pkg"; then
              echo "::error::$pkg is missing from the plugin jar"
              exit 1
            fi
          done
          unzip -p "$jar" META-INF/MANIFEST.MF | grep -q 'X-Kestra-Name' \
            || { echo "::error::manifest is missing the X-Kestra-* attributes"; exit 1; }

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test
          retention-days: 7

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: plugin-rest-server
          path: build/libs/plugin-rest-server-*.jar
          retention-days: 7
