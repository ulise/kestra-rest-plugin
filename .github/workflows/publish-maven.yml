name: Publish Maven (gh-pages)

# Publishes each release to the public, static Maven repository served from the `gh-pages` branch, so the
# plugin resolves by coordinates with no credentials:
#   kestra plugins install io.kestra.plugin:plugin-rest-server:<version> \
#     --repositories https://ulise.github.io/kestra-rest-plugin/maven
#
# It publishes into a checkout of gh-pages so maven-metadata.xml merges across releases rather than resetting.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to publish (e.g. v1.1.3). Must contain this workflow's Gradle config."
        required: true

permissions:
  contents: write

concurrency:
  group: publish-maven
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the release source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Checkout gh-pages (so maven-metadata.xml merges)
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish to the gh-pages Maven repo
        run: ./gradlew publishMavenPublicationToGhPagesRepository -PghPagesRepoDir=$GITHUB_WORKSPACE/gh-pages/maven --no-daemon

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "Publish ${{ github.event.inputs.ref || github.ref_name }} to Maven repo"
            git push
          else
            echo "Nothing to publish."
          fi
